name: Shared Test Runner

on:
  workflow_call:
    inputs:
      suite:
        description: Test suite to run
        required: false
        default: all
        type: string
      project:
        description: Browser project to run
        required: false
        default: chromium
        type: string
      grep:
        description: Optional grep expression
        required: false
        default: ""
        type: string
      workflow-name:
        description: Display name used in logs and notifications
        required: false
        default: QA Tests
        type: string
      node-version:
        description: Node.js version for the runner
        required: false
        default: "24"
        type: string
      timeout-minutes:
        description: Job timeout in minutes
        required: false
        default: 60
        type: number
      upload-allure:
        description: Generate and upload Allure artifacts
        required: false
        default: false
        type: boolean
      upload-console-results:
        description: Upload console output artifact
        required: false
        default: true
        type: boolean
      publish-pages-report:
        description: Publish the generated HTML report to GitHub Pages
        required: false
        default: false
        type: boolean
      pages-report-path:
        description: Directory with the HTML report that should be published
        required: false
        default: playwright-report
        type: string
      pages-report-name:
        description: Human readable name of the published report
        required: false
        default: Playwright report
        type: string
      notify-slack:
        description: Send Slack notification when credentials are configured
        required: false
        default: false
        type: boolean
      stop-containers:
        description: Stop docker compose services at the end of the run
        required: false
        default: true
        type: boolean

jobs:
  test:
    name: ${{ inputs.workflow-name }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    permissions:
      contents: read
    outputs:
      passed: ${{ steps.test_summary.outputs.passed }}
      failed: ${{ steps.test_summary.outputs.failed }}
      skipped: ${{ steps.test_summary.outputs.skipped }}
      flaky: ${{ steps.test_summary.outputs.flaky }}
      playwright-artifact-url: ${{ steps.playwright_report.outputs.artifact-url }}
      allure-artifact-url: ${{ steps.allure_report.outputs.artifact-url }}
      analysis-message: ${{ steps.analyze.outputs.analysis-message }}

    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000

    env:
      CI: "true"
      BASE_URL: "http://juice-shop:3000"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Wait for Juice Shop
        run: |
          timeout 90s bash -c 'until curl -sf http://juice-shop:3000 > /dev/null; do sleep 5; done'

      - name: Run selected tests
        id: run_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail

          SUITE="${{ inputs.suite }}"
          PROJECT="${{ inputs.project }}"
          GREP="${{ inputs.grep }}"

          CMD="npx playwright test"

          if [ "$SUITE" = "ui" ]; then
            CMD="$CMD tests/ui"
          elif [ "$SUITE" = "api" ]; then
            CMD="$CMD tests/api"
          elif [ "$SUITE" = "security" ]; then
            CMD="$CMD tests/security"
          elif [ "$SUITE" = "smoke" ]; then
            CMD="$CMD --grep @smoke"
          elif [ "$SUITE" = "auth" ]; then
            CMD="$CMD --grep @auth"
          elif [ "$SUITE" = "search" ]; then
            CMD="$CMD --grep @search"
          elif [ "$SUITE" = "basket" ]; then
            CMD="$CMD --grep @basket"
          fi

          if [ "$PROJECT" != "all" ]; then
            CMD="$CMD --project=$PROJECT"
          fi

          if [ -n "$GREP" ]; then
            CMD="$CMD --grep \"$GREP\""
          fi

          echo "Running command: $CMD"
          eval "$CMD" | tee test-results.txt

      - name: Note test status
        if: always()
        run: |
          if [ "${{ steps.run_tests.outcome }}" = "failure" ]; then
            echo "⚠️ Test failures are allowed for this workflow and will not fail the job."
          else
            echo "✅ Tests completed without step-level failure."
          fi

      - name: Collect test summary
        if: always()
        id: test_summary
        shell: bash
        run: |
          extract_total() {
            local label="$1"
            local value
            if [ ! -f test-results.txt ]; then
              echo "0"
              return
            fi

            value=$(grep -oE "[0-9]+ ${label}" test-results.txt | awk '{s+=$1} END {print s+0}')
            echo "${value:-0}"
          }

          echo "passed=$(extract_total passed)" >> "$GITHUB_OUTPUT"
          echo "failed=$(extract_total failed)" >> "$GITHUB_OUTPUT"
          echo "skipped=$(extract_total skipped)" >> "$GITHUB_OUTPUT"
          echo "flaky=$(extract_total flaky)" >> "$GITHUB_OUTPUT"

      - name: Show report folders
        if: always()
        run: |
          echo "==== root ===="
          ls -la || true
          echo "==== playwright-report ===="
          ls -la playwright-report || true
          echo "==== allure-results ===="
          ls -la allure-results || true
          echo "==== allure-report ===="
          ls -la allure-report || true

      - name: Upload console test results
        if: ${{ always() && inputs.upload-console-results }}
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: ignore
          name: test-results
          path: test-results.txt
          retention-days: 7

      - name: Install Java for Allure
        if: ${{ always() && inputs.upload-allure }}
        run: |
          apt-get update -qq && apt-get install -y -qq default-jre-headless > /dev/null

      - name: Generate Allure report
        if: ${{ always() && inputs.upload-allure }}
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "Generating Allure report from allure-results"
            ls -la allure-results || true
            npx allure generate allure-results --clean -o allure-report
            echo "Generated allure-report contents:"
            ls -la allure-report || true
          else
            echo "No allure-results found, skipping Allure generation"
          fi

      - name: Upload Playwright report
        if: always()
        id: playwright_report
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: ignore
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Prepare published report
        if: ${{ always() && inputs.publish-pages-report }}
        shell: bash
        run: |
          REPORT_PATH="${{ inputs.pages-report-path }}"
          rm -rf published-report
          mkdir -p published-report

          if [ -d "$REPORT_PATH" ] && [ "$(ls -A "$REPORT_PATH" 2>/dev/null)" ]; then
            cp -R "$REPORT_PATH"/. published-report/
            echo "Prepared published-report from $REPORT_PATH"
          elif [ -d "playwright-report" ] && [ "$(ls -A playwright-report 2>/dev/null)" ]; then
            cp -R playwright-report/. published-report/
            echo "Requested report directory $REPORT_PATH is missing, published playwright-report instead"
          else
            cat > published-report/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>${{ inputs.pages-report-name }}</title>
            </head>
            <body>
              <h1>${{ inputs.pages-report-name }} is unavailable</h1>
              <p>The expected report directory <code>$REPORT_PATH</code> was not generated for this run.</p>
              <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Open GitHub Actions run</a></p>
            </body>
          </html>
          EOF
            echo "Prepared fallback published-report page because $REPORT_PATH is missing"
          fi

          # Bundle additional reports as subdirectories so each has a stable URL
          if [ -d "playwright-report" ] && [ "$(ls -A playwright-report 2>/dev/null)" ]; then
            cp -R playwright-report/. published-report/playwright-report/
            echo "Bundled playwright-report/"
          fi
          if [ -d "allure-report" ] && [ "$(ls -A allure-report 2>/dev/null)" ]; then
            cp -R allure-report/. published-report/allure-report/
            echo "Bundled allure-report/"
          fi

      - name: Upload Pages artifact
        if: ${{ always() && inputs.publish-pages-report }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: published-report

      - name: Upload Allure results
        if: ${{ always() && inputs.upload-allure }}
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: ignore
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload Allure report
        if: ${{ always() && inputs.upload-allure }}
        id: allure_report
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: ignore
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Attach report links to workflow summary
        if: always()
        run: |
          echo "[GitHub Actions Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.publish-pages-report }}" = "true" ]; then
            echo "Published report links will appear after the Pages deployment job finishes." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${{ steps.playwright_report.outputs.artifact-url }}" ]; then
            echo "[Download Playwright report artifact](${{ steps.playwright_report.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${{ steps.allure_report.outputs.artifact-url }}" ]; then
            echo "[Download Allure report artifact](${{ steps.allure_report.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Analyze test results
        if: ${{ always() && inputs.notify-slack }}
        id: analyze
        shell: bash
        run: |
          if [ -f test-report.json ]; then
            npx tsx src/agents/analyzer/analyzeResults.ts test-report.json analysis-message.txt
            {
              echo 'analysis-message<<EOF'
              cat analysis-message.txt
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "No test-report.json found, skipping analysis"
            echo "analysis-message=" >> "$GITHUB_OUTPUT"
          fi

  deploy_report:
    name: Deploy Published Report
    if: ${{ inputs.publish-pages-report }}
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page-url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add published report links to summary
        if: always()
        run: |
          PAGE_URL="${{ steps.deployment.outputs.page_url }}"
          echo "[Open published ${{ inputs.pages-report-name }}](${PAGE_URL})" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open Playwright report](${PAGE_URL}playwright-report/)" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.upload-allure }}" = "true" ]; then
            echo "[Open Allure report](${PAGE_URL}allure-report/)" >> "$GITHUB_STEP_SUMMARY"
          fi

  notify:
    name: Notify Slack
    if: ${{ always() && inputs.notify-slack }}
    needs:
      - test
      - deploy_report
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    steps:
      - name: Debug Slack configuration
        if: always()
        shell: bash
        run: |
          echo "notify-slack input: ${{ inputs.notify-slack }}"
          echo "github event: ${{ github.event_name }}"
          echo "github ref: ${{ github.ref }}"
          echo "github actor: ${{ github.actor }}"
          echo "deploy_report result: ${{ needs.deploy_report.result }}"
          echo "published report url: ${{ needs.deploy_report.outputs.page-url }}"

          if [ -n "${SLACK_CHANNEL_ID}" ]; then
            echo "SLACK_CHANNEL_ID is present"
          else
            echo "SLACK_CHANNEL_ID is missing or empty"
          fi

          if [ -n "${SLACK_BOT_TOKEN}" ]; then
            echo "SLACK_BOT_TOKEN is present"
          else
            echo "SLACK_BOT_TOKEN is missing or empty"
          fi

      - name: Explain Slack skip reason
        if: ${{ always() && (env.SLACK_CHANNEL_ID == '' || env.SLACK_BOT_TOKEN == '') }}
        shell: bash
        run: |
          if [ -z "${SLACK_CHANNEL_ID}" ]; then
            echo "Slack notification skipped because SLACK_CHANNEL_ID is unavailable"
          fi

          if [ -z "${SLACK_BOT_TOKEN}" ]; then
            echo "Slack notification skipped because SLACK_BOT_TOKEN is unavailable"
          fi

      - name: Generate Slack message
        if: ${{ always() && env.SLACK_CHANNEL_ID != '' && env.SLACK_BOT_TOKEN != '' }}
        id: slack_message
        shell: bash
        run: |
          {
            echo 'message<<EOF'
            echo "*${{ inputs.workflow-name }}* finished for \`${{ github.ref_name }}\`"
            echo ""
            echo ":white_check_mark: Passed: ${{ needs.test.outputs.passed }}"
            echo ":x: Failed: ${{ needs.test.outputs.failed }}"
            echo ":white_circle: Skipped: ${{ needs.test.outputs.skipped }}"
            echo ":large_blue_circle: Flaky: ${{ needs.test.outputs.flaky }}"
            echo ""
            echo "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open GitHub Actions run>"
            PAGE_URL="${{ needs.deploy_report.outputs.page-url }}"
            if [ -n "$PAGE_URL" ]; then
              echo "<${PAGE_URL}playwright-report/|Open Playwright report>"
              if [ "${{ inputs.upload-allure }}" = "true" ]; then
                echo "<${PAGE_URL}allure-report/|Open Allure report>"
              fi
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Notify in Slack
        id: slack_notify
        if: ${{ always() && steps.slack_message.outputs.message != '' }}
        uses: slackapi/slack-github-action@v1.27.0
        with:
          channel-id: ${{ vars.SLACK_CHANNEL_ID }}
          slack-message: ${{ steps.slack_message.outputs.message }}

      - name: Post analysis as thread reply
        if: ${{ always() && steps.slack_notify.outputs.ts != '' && needs.test.outputs.analysis-message != '' }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        shell: bash
        run: |
          ANALYSIS_TEXT=$(cat <<'ANALYSIS_EOF'
          ${{ needs.test.outputs.analysis-message }}
          ANALYSIS_EOF
          )

          PAYLOAD=$(jq -n \
            --arg channel "${{ vars.SLACK_CHANNEL_ID }}" \
            --arg thread_ts "${{ steps.slack_notify.outputs.ts }}" \
            --arg text "$ANALYSIS_TEXT" \
            '{channel: $channel, thread_ts: $thread_ts, text: $text}')

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
