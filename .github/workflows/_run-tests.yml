name: Shared Test Runner

on:
  workflow_call:
    inputs:
      suite:
        description: Test suite to run
        required: false
        default: all
        type: string
      project:
        description: Browser project to run
        required: false
        default: chromium
        type: string
      grep:
        description: Optional grep expression
        required: false
        default: ""
        type: string
      workflow-name:
        description: Display name used in logs and notifications
        required: false
        default: QA Tests
        type: string
      node-version:
        description: Node.js version for the runner
        required: false
        default: "24"
        type: string
      timeout-minutes:
        description: Job timeout in minutes
        required: false
        default: 60
        type: number
      upload-allure:
        description: Generate and upload Allure artifacts
        required: false
        default: false
        type: boolean
      upload-console-results:
        description: Upload console output artifact
        required: false
        default: true
        type: boolean
      publish-pages-report:
        description: Publish the generated HTML report to GitHub Pages
        required: false
        default: false
        type: boolean
      pages-report-path:
        description: Directory with the HTML report that should be published
        required: false
        default: playwright-report
        type: string
      pages-report-name:
        description: Human readable name of the published report
        required: false
        default: Playwright report
        type: string
      notify-slack:
        description: Send Slack notification when credentials are configured
        required: false
        default: false
        type: boolean
      stop-containers:
        description: Stop docker compose services at the end of the run
        required: false
        default: true
        type: boolean

jobs:
  test:
    name: ${{ inputs.workflow-name }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      passed: ${{ steps.test_summary.outputs.passed }}
      failed: ${{ steps.test_summary.outputs.failed }}
      skipped: ${{ steps.test_summary.outputs.skipped }}
      flaky: ${{ steps.test_summary.outputs.flaky }}
      playwright-artifact-url: ${{ steps.playwright_report.outputs.artifact-url }}

    env:
      CI: "true"
      BASE_URL: "http://localhost:3000"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        shell: bash
        run: |
          PROJECT="${{ inputs.project }}"
          BROWSERS="$PROJECT"

          if [ "$PROJECT" = "all" ]; then
            BROWSERS="chromium firefox webkit"
          fi

          for attempt in 1 2 3; do
            echo "Installing Playwright browser dependencies, attempt $attempt"
            if npx playwright install --with-deps $BROWSERS; then
              exit 0
            fi

            echo "Playwright browser install failed, retrying..."
            sleep 10
          done

          npx playwright install --with-deps $BROWSERS

      - name: Start Juice Shop
        run: docker compose up -d

      - name: Wait for Juice Shop
        run: |
          timeout 90s bash -c 'until curl -f http://localhost:3000; do sleep 5; done'

      - name: Run selected tests
        id: run_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail

          SUITE="${{ inputs.suite }}"
          PROJECT="${{ inputs.project }}"
          GREP="${{ inputs.grep }}"

          CMD="npx playwright test"

          if [ "$SUITE" = "ui" ]; then
            CMD="$CMD tests/ui"
          elif [ "$SUITE" = "api" ]; then
            CMD="$CMD tests/api"
          elif [ "$SUITE" = "security" ]; then
            CMD="$CMD tests/security"
          elif [ "$SUITE" = "smoke" ]; then
            CMD="$CMD --grep @smoke"
          elif [ "$SUITE" = "auth" ]; then
            CMD="$CMD --grep @auth"
          elif [ "$SUITE" = "search" ]; then
            CMD="$CMD --grep @search"
          elif [ "$SUITE" = "basket" ]; then
            CMD="$CMD --grep @basket"
          fi

          if [ "$PROJECT" != "all" ]; then
            CMD="$CMD --project=$PROJECT"
          fi

          if [ -n "$GREP" ]; then
            CMD="$CMD --grep \"$GREP\""
          fi

          echo "Running command: $CMD"
          eval "$CMD" | tee test-results.txt

      - name: Copy Allure metadata
        if: ${{ always() && inputs.upload-allure }}
        run: |
          mkdir -p allure-results
          cp allure/environment.properties allure-results/environment.properties
          cp allure/categories.json allure-results/categories.json

      - name: Generate Allure report
        if: ${{ always() && inputs.upload-allure }}
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure results
        if: ${{ always() && inputs.upload-allure }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload Allure report
        if: ${{ always() && inputs.upload-allure }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Note test status
        if: always()
        run: |
          if [ "${{ steps.run_tests.outcome }}" = "failure" ]; then
            echo "⚠️ Test failures are allowed for this workflow and will not fail the job."
          else
            echo "✅ Tests completed without step-level failure."
          fi

      - name: Collect test summary
        if: always()
        id: test_summary
        shell: bash
        run: |
          extract_total() {
            local label="$1"
            local value
            if [ ! -f test-results.txt ]; then
              echo "0"
              return
            fi

            value=$(grep -oE "[0-9]+ ${label}" test-results.txt | awk '{s+=$1} END {print s+0}')
            echo "${value:-0}"
          }

          echo "passed=$(extract_total passed)" >> "$GITHUB_OUTPUT"
          echo "failed=$(extract_total failed)" >> "$GITHUB_OUTPUT"
          echo "skipped=$(extract_total skipped)" >> "$GITHUB_OUTPUT"
          echo "flaky=$(extract_total flaky)" >> "$GITHUB_OUTPUT"

      - name: Show report folders
        if: always()
        run: |
          echo "==== root ===="
          ls -la || true
          echo "==== playwright-report ===="
          ls -la playwright-report || true
          echo "==== allure-results ===="
          ls -la allure-results || true
          echo "==== allure-report ===="
          ls -la allure-report || true

      - name: Upload console test results
        if: ${{ always() && inputs.upload-console-results }}
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: ignore
          name: test-results
          path: test-results.txt
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        id: playwright_report
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: ignore
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Prepare published report
        if: ${{ always() && inputs.publish-pages-report }}
        shell: bash
        run: |
          REPORT_PATH="${{ inputs.pages-report-path }}"
          rm -rf published-report
          mkdir -p published-report

          if [ -d "$REPORT_PATH" ] && [ "$(ls -A "$REPORT_PATH" 2>/dev/null)" ]; then
            cp -R "$REPORT_PATH"/. published-report/
            echo "Prepared published-report from $REPORT_PATH"
          elif [ -d "playwright-report" ] && [ "$(ls -A playwright-report 2>/dev/null)" ]; then
            cp -R playwright-report/. published-report/
            echo "Requested report directory $REPORT_PATH is missing, published playwright-report instead"
          else
            cat > published-report/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>${{ inputs.pages-report-name }}</title>
            </head>
            <body>
              <h1>${{ inputs.pages-report-name }} is unavailable</h1>
              <p>The expected report directory <code>$REPORT_PATH</code> was not generated for this run.</p>
              <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Open GitHub Actions run</a></p>
            </body>
          </html>
          EOF
            echo "Prepared fallback published-report page because $REPORT_PATH is missing"
          fi

      - name: Upload Pages artifact
        if: ${{ always() && inputs.publish-pages-report }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: published-report

      - name: Stop containers
        if: ${{ always() && inputs.stop-containers }}
        run: docker compose down -v

      - name: Attach report links to workflow summary
        if: always()
        run: |
          echo "[GitHub Actions Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          echo "Playwright HTML report is uploaded as artifact \`playwright-report\`." >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.playwright_report.outputs.artifact-url }}" ]; then
            echo "[Open Playwright report artifact](${{ steps.playwright_report.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ inputs.publish-pages-report }}" = "true" ]; then
            echo "A published ${{ inputs.pages-report-name }} link will appear after the Pages deployment job finishes." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ inputs.upload-allure }}" = "true" ]; then
            echo "Allure artifacts are uploaded as \`allure-results\` and \`allure-report\` when generated." >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy_report:
    name: Deploy Published Report
    if: ${{ inputs.publish-pages-report }}
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page-url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add published report link to summary
        if: always()
        run: |
          echo "[Open published ${{ inputs.pages-report-name }}](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Notify Slack
    if: ${{ always() && inputs.notify-slack }}
    needs:
      - test
      - deploy_report
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    steps:
      - name: Debug Slack configuration
        if: always()
        shell: bash
        run: |
          echo "notify-slack input: ${{ inputs.notify-slack }}"
          echo "github event: ${{ github.event_name }}"
          echo "github ref: ${{ github.ref }}"
          echo "github actor: ${{ github.actor }}"
          echo "deploy_report result: ${{ needs.deploy_report.result }}"
          echo "published report url: ${{ needs.deploy_report.outputs.page-url }}"

          if [ -n "${SLACK_CHANNEL_ID}" ]; then
            echo "SLACK_CHANNEL_ID is present"
          else
            echo "SLACK_CHANNEL_ID is missing or empty"
          fi

          if [ -n "${SLACK_BOT_TOKEN}" ]; then
            echo "SLACK_BOT_TOKEN is present"
          else
            echo "SLACK_BOT_TOKEN is missing or empty"
          fi

      - name: Explain Slack skip reason
        if: ${{ always() && (env.SLACK_CHANNEL_ID == '' || env.SLACK_BOT_TOKEN == '') }}
        shell: bash
        run: |
          if [ -z "${SLACK_CHANNEL_ID}" ]; then
            echo "Slack notification skipped because SLACK_CHANNEL_ID is unavailable"
          fi

          if [ -z "${SLACK_BOT_TOKEN}" ]; then
            echo "Slack notification skipped because SLACK_BOT_TOKEN is unavailable"
          fi

      - name: Generate Slack message
        if: ${{ always() && env.SLACK_CHANNEL_ID != '' && env.SLACK_BOT_TOKEN != '' }}
        id: slack_message
        shell: bash
        run: |
          {
            echo 'message<<EOF'
            echo "*${{ inputs.workflow-name }}* finished for \`${{ github.ref_name }}\`"
            echo ""
            echo ":white_check_mark: Passed: ${{ needs.test.outputs.passed }}"
            echo ":x: Failed: ${{ needs.test.outputs.failed }}"
            echo ":white_circle: Skipped: ${{ needs.test.outputs.skipped }}"
            echo ":large_blue_circle: Flaky: ${{ needs.test.outputs.flaky }}"
            echo ""
            echo "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open GitHub Actions run>"
            if [ -n "${{ needs.deploy_report.outputs.page-url }}" ]; then
              echo "<${{ needs.deploy_report.outputs.page-url }}|Open published ${{ inputs.pages-report-name }}>"
            elif [ -n "${{ needs.test.outputs.playwright-artifact-url }}" ]; then
              echo "<${{ needs.test.outputs.playwright-artifact-url }}|Open Playwright report artifact>"
            else
              echo "Artifact: \`playwright-report\`"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Notify in Slack
        if: ${{ always() && steps.slack_message.outputs.message != '' }}
        uses: slackapi/slack-github-action@v1.27.0
        with:
          channel-id: ${{ vars.SLACK_CHANNEL_ID }}
          slack-message: ${{ steps.slack_message.outputs.message }}
